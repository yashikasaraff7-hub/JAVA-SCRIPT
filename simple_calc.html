<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
</head>
<body>
    <h2 style="text-align: center; padding-top: 20px;">Simple Calculator</h2>
    <script>

        let num1 = parseFloat(prompt("Enter first number:"));
        let operator = prompt("Enter operator (+, -, *, /):");
        let num2 = parseFloat(prompt("Enter second number:"));
        let result;

        if (operator === "+") {
            result = num1 + num2;
        } else if (operator === "-") {
            result = num1 - num2;
        } else if (operator === "*") {
            result = num1 * num2;
        } else if (operator === "/") {
            result = (num2 !== 0) ? num1 / num2 : "Error: Divide by zero";
        } else {
            result = "Invalid operator";
        }
        // Display the result
        alert("Result: " + result);
    </script>
</body>
</html>
