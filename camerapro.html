<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Control Catch Game</title>

<style>
body{
    text-align:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(to right,#74ebd5,#ACB6E5);
}

canvas{
    border:2px solid black;
    background:white;
    margin-top:10px;
}
</style>

</head>
<body>

<h2>🖐 Hand Control Catch Game</h2>
<p>Move your hand left and right to catch the falling red blocks!</p>

<video id="video" width="300" height="200" autoplay style="display:none;"></video>
<br>
<canvas id="game" width="400" height="300"></canvas>
<h3 id="score">Score: 0</h3>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose"></script>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('score');

let playerX = 180;
let score = 0;
let gameOver = false;

// Enemy Object
let enemy = {
    x: Math.random() * 360,
    y: 0,
    size: 30,
    speed: 3
};

// Setup Camera
async function setupCamera(){
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject = stream;

    return new Promise(resolve=>{
        video.onloadedmetadata = ()=>{
            resolve(video);
        };
    });
}

// Main Function
async function main(){
    await setupCamera();
    video.play();

    const model = await handpose.load();

    async function gameLoop(){

        if(gameOver) return;

        ctx.clearRect(0,0,canvas.width,canvas.height);

        // Detect Hand
        const predictions = await model.estimateHands(video);

        if(predictions.length > 0){
            const wrist = predictions[0].landmarks[0];
            const x = wrist[0];

            playerX = (x / video.width) * canvas.width - 20;

            // Keep player inside canvas
            if(playerX < 0) playerX = 0;
            if(playerX > canvas.width - 40) playerX = canvas.width - 40;
        }

        // Draw Player
        ctx.fillStyle = "blue";
        ctx.fillRect(playerX,250,40,40);

        // Move Enemy
        enemy.y += enemy.speed;

        ctx.fillStyle = "red";
        ctx.fillRect(enemy.x,enemy.y,enemy.size,enemy.size);

        // Collision Detection
        if(
            enemy.y + enemy.size >= 250 &&
            enemy.x < playerX + 40 &&
            enemy.x + enemy.size > playerX
        ){
            score++;
            scoreDisplay.innerText = "Score: " + score;
            resetEnemy();
        }

        // If Missed
        if(enemy.y > canvas.height){
            gameOver = true;
            ctx.fillStyle = "black";
            ctx.font = "30px Arial";
            ctx.fillText("Game Over!",120,150);
            return;
        }

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
}

// Reset Enemy Position
function resetEnemy(){
    enemy.y = 0;
    enemy.x = Math.random() * 360;
}

main();

</script>

</body>
</html>
