<!DOCTYPE html>
<html>
<head>
    <title>McDonald's Mini Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #fff8e1;
        }

        header {
            background-color: #d32f2f;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }

        .banner img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .meals {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
        }

        .card {
            background-color: white;
            width: 250px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px gray;
        }

        .card img {
            width: 100%;
            height: 150px;
            border-radius: 10px;
        }

        button {
            margin-top: 30px;
            padding: 12px 25px;
            font-size: 16px;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        footer {
            margin-top: 40px;
            background-color: #333;
            color: white;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

<header>
    🍔 McDonald's Official Meal Order
</header>

<div class="banner">
    <img src="https://media.istockphoto.com/id/637275080/photo/mcdonalds-exterior.jpg?s=612x612&w=0&k=20&c=2boXi-q35Isycmmte3vpnyo3FTtnGrpo6TxHzh-EZ30=">
</div>

<div class="container">
    <h2>Choose Your Favorite Meal</h2>

    <div class="meals">

        <div class="card">
            <img src="https://mcdonaldsblog.in/wp-content/uploads/2022/02/its-breakfast-oclock.jpg">
            <br><br>
            <input type="radio" name="meal" value="McBreakfast" data-price="120">
            <b>McBreakfast</b>
            <p>₹120</p>
        </div>

        <div class="card">
            <img src="https://eatbook.sg/wp-content/uploads/2022/10/mcdonalds-lunch-deal-poster-1024x1024.jpg">
            <br><br>
            <input type="radio" name="meal" value="McLunch" data-price="250">
            <b>McLunch</b>
            <p>₹250</p>
        </div>

        <div class="card">
            <img src="https://1045freshradio.ca/wp-content/uploads/sites/11/2022/08/Screen-Shot-2022-08-16-at-3.56.23-PM.png?w=1024">
            <br><br>
            <input type="radio" name="meal" value="McDinner" data-price="300">
            <b>McDinner</b>
            <p>₹300</p>
        </div>

    </div>

    <button onclick="placeOrder()">Place Order</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
