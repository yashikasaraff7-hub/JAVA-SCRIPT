<!DOCTYPE html>
<html>
<head>
<title>Simple Creative To Do</title>

<style>
body{
    font-family: Arial;
    background:#f5f7ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    border-radius:12px;
    width:300px;
    box-shadow:0px 4px 15px rgba(0,0,0,0.1);
    text-align:center;
}

h2{
    margin-bottom:15px;
}

input{
    width:70%;
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    padding:8px 10px;
    border:none;
    border-radius:6px;
    background:#6c7cff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#4e5cff;
}

li{
    list-style:none;
    margin-top:10px;
    padding:8px;
    background:#f0f2ff;
    border-radius:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.deleteBtn{
    background:red;
    padding:4px 8px;
    font-size:12px;
}
</style>

</head>
<body>

<div class="container">
<h2>✨ My To Do List</h2>

<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>
</div>

<script>

function addTask(){

    let input=document.getElementById("taskInput");
    let task=input.value;

    if(task===""){
        alert("Enter something!");
        return;
    }

    let li=document.createElement("li");
    li.textContent=task;

    let delBtn=document.createElement("button");
    delBtn.textContent="X";
    delBtn.className="deleteBtn";

    delBtn.onclick=function(){
        li.remove();
    }

    li.appendChild(delBtn);

    document.getElementById("taskList").appendChild(li);

    input.value="";
}

</script>

</body>
</html>
