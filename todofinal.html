<!DOCTYPE html>
<html>
<head>
<title>To do App</title>

<style>

body{
    font-family:Arial;
    background:linear-gradient(135deg,#a18cd1,#fbc2eb);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    width:360px;
    border-radius:15px;
    box-shadow:0px 8px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:10px;
}

input{
    width:65%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#6675ff;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

ul{
    padding:0;
    margin-top:15px;
}

li{
    list-style:none;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:white;
    font-weight:bold;
}

.completed{
    text-decoration:line-through;
    opacity:0.6;
}

.deleteBtn{
    background:red;
    font-size:12px;
    padding:5px 8px;
    margin-left:5px;
}

.counter{
    font-size:14px;
    margin-top:10px;
    color:#555;
}

</style>

</head>
<body>

<div class="container">

<h2>My To-Do List📝</h2>

<input type="text" id="taskInput" placeholder="Enter task">
<button id="addBtn">Add</button>

<div class="counter" id="counter">Total Tasks: 0</div>

<ul id="taskList"></ul>

</div>

<script src="todo.js"></script>

</body>
</html>
