<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ My Colorful To-Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B9D;
            --secondary: #C44569;
            --accent: #FFA07A;
            --success: #54E346;
            --bg-start: #667eea;
            --bg-end: #764ba2;
            --text: #2d3436;
            --text-light: #636e72;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation: float 20s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -80px;
            right: -80px;
            animation: float 15s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 50px) scale(1.1); }
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            position: relative;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: -1px;
        }

        .input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #todoInput {
            flex: 1;
            padding: 15px 20px;
            border: 3px solid transparent;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(135deg, var(--primary), var(--accent)) border-box;
            border-radius: 15px;
            font-size: 16px;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        #todoInput:focus {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 157, 0.3);
        }

        #addBtn {
            padding: 15px 30px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Fredoka', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 107, 157, 0.4);
        }

        #addBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 157, 0.5);
        }

        #addBtn:active {
            transform: translateY(-1px);
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            flex: 1;
            padding: 15px;
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.1), rgba(255, 160, 122, 0.1));
            border-radius: 15px;
            text-align: center;
            border: 2px solid rgba(255, 107, 157, 0.2);
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            font-family: 'Fredoka', sans-serif;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .action-btn {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Fredoka', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 157, 0.3);
        }

        .action-btn.danger {
            border-color: #FF6B6B;
            color: #FF6B6B;
        }

        .action-btn.danger:hover {
            background: #FF6B6B;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .action-btn:disabled:hover {
            background: white;
            color: var(--primary);
            box-shadow: none;
        }

        #todoList {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        #todoList::-webkit-scrollbar {
            width: 8px;
        }

        #todoList::-webkit-scrollbar-track {
            background: rgba(255, 107, 157, 0.1);
            border-radius: 10px;
        }

        #todoList::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 10px;
        }

        .todo-item {
            background: white;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 3px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            animation: slideInItem 0.3s ease-out;
            border-left: 4px solid var(--primary);
        }

        @keyframes slideInItem {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .todo-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(255, 107, 157, 0.2);
        }

        .todo-item.completed {
            opacity: 0.6;
            border-left-color: var(--success);
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-light);
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 3px solid var(--primary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
        }

        .checkbox:hover {
            transform: scale(1.1);
            border-color: var(--secondary);
        }

        .checkbox.checked {
            background: linear-gradient(135deg, var(--success), #48C9B0);
            border-color: var(--success);
        }

        .checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .todo-text {
            flex: 1;
            color: var(--text);
            font-size: 16px;
            word-break: break-word;
        }

        .delete-btn {
            background: linear-gradient(135deg, #FF6B6B, #EE5A6F);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Fredoka', sans-serif;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .empty-state-text {
            font-size: 18px;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ My To-Do List</h1>
        
        <div class="input-container">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="What needs to be done? ✏️"
                autocomplete="off"
            >
            <button id="addBtn">Add</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="activeCount">0</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">Done</div>
            </div>
        </div>

        <div class="action-buttons">
            <button id="clearCompleted" class="action-btn">🗑️ Clear Completed</button>
            <button id="clearAll" class="action-btn danger">❌ Clear All</button>
        </div>

        <ul id="todoList"></ul>
    </div>

    <script>
        // Get elements
        const todoInput = document.getElementById('todoInput');
        const addBtn = document.getElementById('addBtn');
        const todoList = document.getElementById('todoList');
        const totalCount = document.getElementById('totalCount');
        const activeCount = document.getElementById('activeCount');
        const completedCount = document.getElementById('completedCount');
        const clearCompletedBtn = document.getElementById('clearCompleted');
        const clearAllBtn = document.getElementById('clearAll');

        // Load todos from localStorage
        let todos = JSON.parse(localStorage.getItem('todos')) || [];

        // Render todos on page load
        renderTodos();

        // Add todo
        addBtn.addEventListener('click', addTodo);
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        // Clear completed todos
        clearCompletedBtn.addEventListener('click', () => {
            todos = todos.filter(todo => !todo.completed);
            saveTodos();
            renderTodos();
            showNotification('✅ Completed tasks cleared!');
        });

        // Clear all todos
        clearAllBtn.addEventListener('click', () => {
            if (confirm('Delete ALL tasks? This cannot be undone!')) {
                todos = [];
                saveTodos();
                renderTodos();
                showNotification('🗑️ All tasks cleared!');
            }
        });

        function addTodo() {
            const text = todoInput.value.trim();
            if (text === '') {
                todoInput.focus();
                return;
            }

            const todo = {
                id: Date.now(),
                text: text,
                completed: false
            };

            todos.push(todo);
            saveTodos();
            renderTodos();
            todoInput.value = '';
            todoInput.focus();
            showNotification('✨ Task added successfully!');
        }

        function deleteTodo(id) {
            todos = todos.filter(todo => todo.id !== id);
            saveTodos();
            renderTodos();
            showNotification('🗑️ Task deleted!');
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            todo.completed = !todo.completed;
            saveTodos();
            renderTodos();
            
            if (todo.completed) {
                showNotification('🎉 Task completed!');
                createConfetti();
            }
        }

        function renderTodos() {
            if (todos.length === 0) {
                todoList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎯</div>
                        <div class="empty-state-text">No tasks yet! Add one to get started.</div>
                    </div>
                `;
            } else {
                todoList.innerHTML = todos.map(todo => `
                    <li class="todo-item ${todo.completed ? 'completed' : ''}">
                        <div class="checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo(${todo.id})"></div>
                        <span class="todo-text">${escapeHtml(todo.text)}</span>
                        <button class="delete-btn" onclick="deleteTodo(${todo.id})">Delete</button>
                    </li>
                `).join('');
            }

            updateStats();
            updateButtons();
        }

        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(todo => todo.completed).length;
            const active = total - completed;

            totalCount.textContent = total;
            activeCount.textContent = active;
            completedCount.textContent = completed;
        }

        function updateButtons() {
            const hasCompleted = todos.some(todo => todo.completed);
            const hasTodos = todos.length > 0;

            clearCompletedBtn.disabled = !hasCompleted;
            clearAllBtn.disabled = !hasTodos;
        }

        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, #FF6B9D, #C44569);
                color: white;
                padding: 15px 25px;
                border-radius: 15px;
                font-family: 'Fredoka', sans-serif;
                font-weight: 600;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
                z-index: 1000;
                animation: slideInNotif 0.3s ease-out;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOutNotif 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 2000);
        }

        function createConfetti() {
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                const colors = ['#FF6B9D', '#FFA07A', '#54E346', '#667eea', '#FFD700'];
                confetti.style.cssText = `
                    position: fixed;
                    width: 10px;
                    height: 10px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    left: 50%;
                    top: 50%;
                    border-radius: 50%;
                    pointer-events: none;
                    z-index: 999;
                    animation: confettiFall ${0.5 + Math.random() * 1}s ease-out forwards;
                    transform: translate(-50%, -50%) rotate(${Math.random() * 360}deg);
                `;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2000);
            }
        }

        // Add animation keyframes
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInNotif {
                from {
                    transform: translateX(400px);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            @keyframes slideOutNotif {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(400px);
                    opacity: 0;
                }
            }
            @keyframes confettiFall {
                to {
                    transform: translate(
                        calc(-50% + ${Math.random() * 400 - 200}px),
                        calc(-50% + ${Math.random() * 400 + 200}px)
                    ) rotate(${Math.random() * 720}deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
