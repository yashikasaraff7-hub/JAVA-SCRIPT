<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in | Uber</title>
<link rel="stylesheet" href="stylees.css">
</head>
<body class="auth-body">
<div class="auth-container">
<a href="index.html" class="auth-logo">Uber</a>
<div class="auth-card">
<h1>What's your phone number or email?</h1>
<form>
<input type="text" placeholder="Enter phone number or email" class="auth-input">
<button type="submit" class="btn-black">Continue</button>
</form>
<div class="divider"><span>or</span></div>
<button class="btn-social">Continue with Google</button>
<button class="btn-social">Continue with Apple</button>
<p class="auth-footer-text">
Don't have an account? <a href="signin.html">Sign up</a>
</p>
</div>
</div>
</body>
</html>
